{% extends 'calificaciones/base.html' %}

{% block title %}Editar Calificación{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        Editar Calificación
    </div>

    <div class="card-body">
        <p class="descripcion">Modifique los datos de la calificación seleccionada.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="mt-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Actualizar
                </button>

                <a href="{% url 'listar_calificaciones' %}" class="btn btn-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
